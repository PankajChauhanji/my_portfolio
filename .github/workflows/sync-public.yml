name: Sync to Public Repo

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify token
        env:
          PUBLIC_REPO_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          if [ -z "$PUBLIC_REPO_TOKEN" ]; then
            echo "❌ PUBLIC_REPO_TOKEN is missing — add it under repo Settings → Secrets"
            exit 1
          fi
          echo "✅ Token verified (${#PUBLIC_REPO_TOKEN} chars)"

      - name: Remove private content
        run: |
          remove_file() { [ -f "$1" ] && rm -f "$1"   && echo "removed: $1"   || echo "skip: $1"; }
          remove_dir()  { [ -d "$1" ] && rm -rf "$1"  && echo "removed: $1/"  || echo "skip: $1/"; }

          # ── Real content data (explorer, blog posts, profile, projects) ──
          remove_file data/explorer.json
          remove_file data/blog.json
          remove_file data/profile.json
          remove_file data/projects.json
          remove_file data/site.json
          remove_file data/resume.pdf

          # ── Blog markdown posts ──
          remove_dir  data/blog

          # ── Real images (webp only; jpgs are already gitignored) ──
          remove_dir  static/img/valley_of_flowers
          remove_dir  static/img/kedarkantha

          # ── Pre-built dist folder (contains rendered private content) ──
          remove_dir  dist

          # ── Python cache ──
          remove_dir  __pycache__
          remove_dir  app/__pycache__

          # ── Secrets and environment files ──
          remove_file .env
          remove_file .env.local
          remove_file .env.production

          # ── This workflow itself ──
          remove_dir  .github

          echo ""
          echo "📁 Remaining data/:"
          ls -la data/ || echo "empty"
          echo ""
          echo "📁 Remaining static/img/:"
          ls -la static/img/

      - name: Push to public repo
        env:
          PUBLIC_REPO_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          git config user.name  "PankajChauhanji"
          git config user.email "pankajchauhan.nitsri@gmail.com"
          git config --global url."https://x-access-token:${PUBLIC_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"

          git remote add public https://github.com/PankajChauhanji/portfolio.git

          git add -A
          git commit -m "sync: public snapshot ($(date -u '+%Y-%m-%d %H:%M UTC'))" || echo "ℹ️  Nothing new to commit"

          git push public main --force && echo "✅ Public repo updated" || { echo "❌ Push failed"; exit 1; }