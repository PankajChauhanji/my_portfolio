{% if site.features.contact and site.contact.enabled %}
<div id="contact-modal" class="fixed inset-0 z-[60] hidden items-center justify-center p-4"
     style="background:rgba(8,10,24,0.82);backdrop-filter:blur(6px)" role="dialog" aria-modal="true" aria-labelledby="contact-title">
  <div class="card rounded-3xl w-full max-w-lg p-6 sm:p-8 relative">
    <button id="contact-close" type="button" aria-label="Close" class="absolute top-4 right-4 w-9 h-9 rounded-full border border-border text-muted hover:text-text transition-colors">&#10005;</button>
    <p class="eyebrow">// contact</p>
    <h2 id="contact-title" class="font-display font-bold text-2xl sm:text-3xl mt-3">{{ site.contact.heading }}</h2>
    <p class="text-muted mt-2 text-sm">{{ site.contact.subtitle }}</p>
    <form id="contact-form" class="mt-6 space-y-4" novalidate
          data-provider="{{ site.contact.provider }}"
          data-to="{{ site.contact.to_email }}"
          data-key="{{ site.contact.web3forms_access_key }}"
          data-success="{{ site.contact.success_message }}">
      <div>
        <label class="form-label" for="cf-email">Email <span style="color:var(--alpenglow-1)">*</span></label>
        <input id="cf-email" name="email" type="email" required autocomplete="email" class="form-input" placeholder="you@example.com">
      </div>
      <div>
        <label class="form-label" for="cf-phone">Phone <span class="text-muted normal-case">(optional)</span></label>
        <input id="cf-phone" name="phone" type="tel" autocomplete="tel" class="form-input" placeholder="+91 ...">
      </div>
      <div>
        <label class="form-label" for="cf-subject">Subject</label>
        <input id="cf-subject" name="subject" type="text" class="form-input" placeholder="Let's talk about...">
      </div>
      <div>
        <label class="form-label" for="cf-message">Message <span style="color:var(--alpenglow-1)">*</span></label>
        <textarea id="cf-message" name="message" rows="4" required class="form-input resize-none" placeholder="Your message"></textarea>
      </div>
      <button type="submit" id="cf-submit" class="btn btn-primary w-full justify-center">Send message</button>
      <p id="cf-status" class="text-sm font-mono text-center hidden" role="status"></p>
    </form>
  </div>
</div>
{% endif %}
